apiVersion: valkey.io/v1alpha1
kind: ValkeyCluster
metadata:
  name: cluster-gateway-sample
spec:
  shards: 3
  replicas: 1
  externalAccess:
    enabled: true
    domain: valkey.example.com
    preferredEndpointType: hostname
    gateway:
      gatewayRef:
        name: public-gateway
      basePort: 30000

apiVersion: valkey.io/v1alpha1
kind: ValkeyCluster
metadata:
  labels:
    app.kubernetes.io/name: valkey-operator
    app.kubernetes.io/managed-by: kustomize
  name: cluster-sample-topology-spread
spec:
  shards: 3
  replicas: 1
  scheduling:
    node:
      spread:
        shards:
          mode: Required
        primaries:
          mode: Disabled
        pods:
          mode: Preferred
